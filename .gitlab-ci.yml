image: ghcr.io/cirruslabs/flutter # Flutter Docker image with required tools
stages:
  - build
  - test
  - lint
  - deploy

variables:

build-job:
  stage: build
  before_script:
    - apt-get update && apt-get install -y openjdk-17-jdk
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - echo "JAVA_HOME is set to $JAVA_HOME"
    - echo "Setting up dynamic Gradle properties..."
    - echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
    - cat android/gradle.properties
    - rm -rf ~/.flutter
    - curl -sL https://storage.googleapis.com/flutter_infra/releases/stable/linux/flutter_linux_3.7.8-stable.tar.xz | tar xJf -
    - flutter channel stable
    - flutter upgrade --force
    - flutter doctor
    - dart --version
  script:
    - echo "Building Flutter application..."
    - flutter build apk --release
    - echo "Build complete."
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk

unit-test-job:
  stage: test
  script:
    - echo "Running Flutter tests..."
    - flutter test
    - echo "Testing done."
  allow_failure: false

lint-test-job: # This job runs code quality checks (analyzes code for errors, style violations, and potential issues)
  stage: lint
  script:
    - echo "Analyzing code quality..."
    - flutter analyze
    - echo "Code analysis completed."
  allow_failure: false

deploy-job: # Placeholder for future deployment tasks
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
