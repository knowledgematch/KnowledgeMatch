image: ghcr.io/cirruslabs/flutter # Imports a Flutter Docker image to provide the necessary tools for builds and tests
stages:
  - build
  - test
  - lint
  - deploy

build-job:
  stage: build
  script:
    - echo "Building Flutter application..."
    - flutter build apk --release
    - echo "Build complete."
  artifacts:
    paths:
      - build/artifacts/

unit-test-job:
  stage: test
  script:
    - echo "Running Flutter tests..."
    - flutter test
    - echo "All tests passed."
  allow_failure: true

lint-test-job:   # This job runs code quality checks (analyzes code for errors, style violations, and potential issues)
  stage: lint
  script:
    - echo "Analyzing code quality..."
    - flutter analyze
    - echo "Code analysis completed with no issues."
  allow_failure: true

deploy-job:      # This job runs in the deploy stage [TODO]
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
