image: ghcr.io/cirruslabs/flutter # Flutter Docker image with required tools

stages:
  - build
  - test
  - lint
  - deploy

variables:
  JAVA_HOME: "/usr/lib/jvm/java-17-openjdk-amd64" # Set Java path for Gradle

build-job:
  stage: build
  before_script:
    - echo "Setting up dynamic Gradle properties..."
    - echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
    - cat android/gradle.properties
  script:
    - echo "Building Flutter application..."
    - flutter build apk --release
    - echo "Build complete."
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
  only:
    - main 
    
unit-test-job:
  stage: test
  script:
    - echo "Running Flutter tests..."
    - flutter test
    - echo "All tests passed."
  allow_failure: true

lint-test-job:   
  stage: lint
  script:
    - echo "Analyzing code quality..."
    - flutter analyze
    - echo "Code analysis completed with no issues."
  allow_failure: true

deploy-job:      # Placeholder for future deployment tasks
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."

push-apk-job:
  stage: deploy
  dependencies:
    - build-job
