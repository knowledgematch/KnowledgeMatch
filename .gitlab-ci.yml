image: ghcr.io/cirruslabs/flutter:latest # Flutter Docker image with required tools
stages:
  - build
  - test
  - lint
  - deploy

build-job:
  stage: build
  script:
    - echo "Building Flutter application..."
    - flutter build apk --release
    - echo "Build complete."
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
  tags:
    - csrunner2

unit-test-job:
  stage: test
  script:
    - echo "Running Flutter tests..."
    - flutter test
    - echo "Testing done."
  allow_failure: false

lint-test-job: # This job runs code quality checks (analyzes code for errors, style violations, and potential issues)
  stage: lint
  script:
    - echo "Analyzing code quality..."
    - flutter analyze
    - echo "Code analysis completed."
  allow_failure: false

deploy-job: # Placeholder for future deployment tasks
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."
