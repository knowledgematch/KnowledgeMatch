image: ghcr.io/cirruslabs/flutter:latest # Flutter Docker image with required tools
stages:
  - build
  - test
  - lint
  - deploy

lint-test-job: # This job runs code quality checks (analyzes code for errors, style violations, and potential issues)
  stage: lint
  script:
    - echo "Analyzing code quality..."
    - flutter analyze
    - echo "Code analysis completed."
  allow_failure: false

unit-test-job:
  stage: test
  script:
    - echo "Running Flutter tests..."
    - flutter test
    - echo "Testing done."
  allow_failure: false

